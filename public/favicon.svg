<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Ruta Colombia — Dark jungle green bg, yellow compass/route motif -->
  <rect width="512" height="512" rx="102" ry="102" fill="#0C2A1A"/>
  <!-- Gold border -->
  <rect x="6" y="6" width="500" height="500" rx="98" ry="98" fill="none" stroke="#FFD700" stroke-width="5" opacity="0.3"/>
  <!-- Compass rose — outer ring -->
  <circle cx="256" cy="240" r="110" fill="none" stroke="#FFD700" stroke-width="8"/>
  <circle cx="256" cy="240" r="90" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.4"/>
  <!-- Compass cardinal points — N S E W ticks -->
  <rect x="252" y="126" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="252" y="330" width="8" height="24" rx="2" fill="#FFD700"/>
  <rect x="142" y="236" width="24" height="8" rx="2" fill="#FFD700"/>
  <rect x="346" y="236" width="24" height="8" rx="2" fill="#FFD700"/>
  <!-- Compass needle — north (pointing up) -->
  <polygon points="256,155 246,248 256,230 266,248" fill="#FFD700"/>
  <!-- Compass needle — south -->
  <polygon points="256,325 246,232 256,250 266,232" fill="#FFD700" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="12" fill="#FFD700"/>
  <!-- Route path below compass -->
  <path d="M160 370 Q200 350 256 365 Q312 380 352 360" fill="none" stroke="#FFD700" stroke-width="7" stroke-linecap="round" stroke-dasharray="12,8"/>
</svg>
