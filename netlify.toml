[build]
  publish = "."
  command = ""

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── 301 redirects: old santamartainsider.com URL structures ──────────────────
# These paths existed on the old site and may be indexed under ruta-colombia.com
# if the domain was pointing here before the full rebrand.
# Preserves Google juice by redirecting old paths to the closest new equivalents.

# Old article pages → closest new equivalent
[[redirects]]
  from = "/things-to-do/guia-parque-tayrona/"
  to   = "/blog/parque-tayrona-como-llegar.html"
  status = 301
  force  = true

